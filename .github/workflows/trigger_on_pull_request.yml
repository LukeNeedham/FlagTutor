name: On Pull Request

on:
    workflow_call:
    workflow_dispatch: {}
    pull_request:
        branches:
            - main

# Cancel in-progress builds when a new commit is pushed to the same PR,
# so only the latest commit's build runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - uses: actions/checkout@v4

          - name: Set up JDK 17
            uses: actions/setup-java@v4
            with:
              java-version: '17'
              distribution: 'zulu'

          - name: Setup Gradle
            uses: gradle/actions/setup-gradle@v4

          - name: Generate Release Metadata
            id: metadata
            run: |
              echo "CURRENT_TIME=$(TZ='Europe/Amsterdam' date +'%d/%m/%Y %H:%M:%S')" >> $GITHUB_ENV
              RAW_BRANCH="${{ github.head_ref || github.ref_name }}"
              CLEAN_BRANCH=$(echo "$RAW_BRANCH" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
              echo "tag=${CLEAN_BRANCH}-${{ github.run_number }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

          - name: Build Debug APK
            run: ./gradlew assembleDebug --no-daemon --build-cache

          - name: Create Release and Upload APK
            id: create-release
            uses: ncipollo/release-action@v1
            with:
              artifacts: "./composeApp/build/outputs/apk/debug/composeApp-debug.apk"
              tag: ${{ steps.metadata.outputs.tag }}
              name: "PR Build: ${{ github.head_ref || github.ref_name }}"
              body: "Debug build generated automatically from branch: ${{ github.head_ref || github.ref_name }} at ${{ env.CURRENT_TIME }}"
              prerelease: true
              draft: false

          - name: Write Example APK comment
            uses: marocchino/sticky-pull-request-comment@v3
            with:
              header: example-app-link
              message: |
                App apk at:
                https://github.com/${{ github.repository }}/releases/download/${{ steps.metadata.outputs.tag }}/composeApp-debug.apk

                * **Triggered by:** PR Commit `${{ github.sha }}`
                * **Built at:** ${{ env.CURRENT_TIME }}
